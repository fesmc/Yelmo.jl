[weakdeps]
Yelmo = "f480e141-c095-4a5e-9e4c-f8685db772bc"
Oceananigans = "9e8cae18-63c1-5223-a75c-80ca9d6e9a09"

[extensions]
# The extension only really needs Yelmo, but Yelmo's grid-construction
# helpers re-route through Oceananigans types we import directly. Both
# are listed as triggers so the extension activates only when both are
# already loaded — since Yelmo depends on Oceananigans, that's
# effectively "when Yelmo is loaded".
YelmoBenchmarks = ["Yelmo", "Oceananigans"]
